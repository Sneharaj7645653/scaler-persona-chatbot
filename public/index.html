<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scaler Persona Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Persona Switcher -->
        <header class="persona-switcher">
            <button class="tab active" data-persona="anshuman">Anshuman</button>
            <button class="tab" data-persona="abhimanyu">Abhimanyu</button>
            <button class="tab" data-persona="kshitij">Kshitij</button>
        </header>

        <!-- Active Persona Banner -->
        <div class="active-banner">
            Talking to: <strong id="active-name-display">Anshuman Singh</strong>
        </div>

        <!-- Chat History -->
        <div id="chat-window" class="chat-window">
            <!-- Messages injected here -->
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="typing-indicator hidden">
            <span></span><span></span><span></span>
        </div>

        <!-- Suggestion Chips -->
        <div id="suggestion-chips" class="suggestion-chips">
            <!-- Chips injected here -->
        </div>

        <!-- Input Area -->
        <form id="chat-form" class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
